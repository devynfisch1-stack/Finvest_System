name: Wochenbericht (Sonntag 18:00)

on:
  schedule:
    # 16:00 UTC = 18:00 Schweizer Sommerzeit (CEST). Im Winter (CET) 17:00 CH-Zeit --
    # bewusst so gewaehlt, dass er im Sommer exakt passt; im Winter 1h frueher.
    - cron: "0 16 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  weekly-report:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt

      - name: Tiefen-Report fuer alle Titel erzeugen
        env:
          EDGAR_UA: "Finvest research ${{ secrets.EDGAR_CONTACT }}"
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FINVEST_WEEKLY: "1"
        run: python run.py

      - name: Archiv committen
        working-directory: .
        run: |
          git config user.name "finvest-bot"
          git config user.email "bot@finvest.local"
          git add backend/data/stocks.json backend/data/reports/ backend/data/history/
          git commit -m "Wochenbericht $(date -u +%Y-%m-%d)" || echo "keine Aenderungen"
          git push
